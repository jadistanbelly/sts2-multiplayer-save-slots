name: Reply to Nexus Post

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write

jobs:
  reply:
    name: Post guarded Nexus reply
    if: ${{ !github.event.issue.pull_request && startsWith(github.event.comment.body, '/nexus-reply') && vars.NEXUSMODS_COMMENT_THREAD_ID != '' && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Reply on Nexus Mods
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          GITHUB_COMMENT_BODY: ${{ github.event.comment.body }}
          GITHUB_ISSUE_BODY: ${{ github.event.issue.body }}
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number }}
          NEXUSMODS_COMMENT_THREAD_ID: ${{ vars.NEXUSMODS_COMMENT_THREAD_ID }}
          NEXUSMODS_GRAPHQL_TOKEN: ${{ secrets.NEXUSMODS_GRAPHQL_TOKEN }}
        run: printf '%s' "$GITHUB_COMMENT_BODY" | node scripts/sync-nexus-posts-to-github.mjs reply
