name: Sync Nexus Posts

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: Sync Nexus posts to GitHub issues
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Nexus fetch dependency
        run: python -m pip install curl_cffi

      - name: Sync Nexus posts
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NEXUSMODS_POSTS_URL: ${{ vars.NEXUSMODS_POSTS_URL }}
          NEXUSMODS_GAME_ID: ${{ vars.NEXUSMODS_GAME_ID }}
          NEXUSMODS_MOD_ID: ${{ vars.NEXUSMODS_MOD_ID }}
          NEXUSMODS_POSTS_THREAD_ID: ${{ vars.NEXUSMODS_POSTS_THREAD_ID }}
        run: python scripts/sync_nexus_posts_to_github.py sync
